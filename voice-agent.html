// ── Icon ─────────────────────────────────────────────────────────────────────
function Icon({ name, size = 18, color = 'currentColor', className = '' }) {
    const ref = useRef(null);
    useEffect(() => {
        if (!ref.current || !lucide?.icons?.[name]) return;
        ref.current.innerHTML = '';
        const svg = lucide.createElement(lucide.icons[name]);
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        svg.setAttribute('stroke', color);
        svg.style.display = 'block';
        svg.style.flexShrink = '0';
        ref.current.appendChild(svg);
    }, [name, size, color]);
    return <span ref={ref} className={`inline-flex items-center ${className}`} />;
}

function generateCalls() {
    const outcomes = ['Booked', 'Not Interested', 'No Answer', 'Voicemail', 'Call Back'];

    const notes = {
        'Booked': 'Prospect agreed to meet. Confirmed email and time slot. Enthusiastic about learning more.',
        'Not Interested': 'Prospect declined. Currently satisfied with lead source. Politely ended call.',
        'No Answer': 'No pickup after 4 rings. Left no voicemail — will retry per trigger rules.',
        'Voicemail': 'Reached voicemail. Left standard message with callback number and website.',
        'Call Back': 'Prospect busy in meeting. Asked to call back tomorrow afternoon.',
    };
    const calls = [];
    for (let i = 0; i < 47; i++) {
        const outcome = outcomes[Math.floor(Math.random() * outcomes.length)];
        const d = new Date('2026-05-04T08:00:00Z');
        d.setMinutes(d.getMinutes() + Math.floor(Math.random() * 3 * 24 * 60));
        calls.push({
            id: `call-${i}`,
            datetime: d.toISOString(),
            lead_name: leads[i % leads.length],
            lead_phone: `(${200+Math.floor(Math.random()*800)}) ${100+Math.floor(Math.random()*900)}-${1000+Math.floor(Math.random()*9000)}`,
            client: MOCK_CLIENTS[i % MOCK_CLIENTS.length].name,
            duration: outcome === 'No Answer' ? Math.floor(Math.random()*15)+5 : Math.floor(Math.random()*240)+30,
            outcome,
            notes: notes[outcome],
        });
    }
    return calls.sort((a, b) => new Date(b.datetime) - new Date(a.datetime));
}

// ── Pagination Hook ──────────────────────────────────────────────────────────
function usePagination(data, perPage = 10) {
    const [pg, setPg] = useState(1);
    const total = Math.ceil(data.length / perPage);
    useEffect(() => { if (pg > total && total > 0) setPg(total); }, [data.length]);
    const slice = data.slice((pg - 1) * perPage, pg * perPage);
    return { page: pg, setPage: setPg, totalPages: total, rows: slice, total: data.length };
}

function CallLogPage() {
    const [search, setSearch] = useState('');
    const [clientFilter, setClientFilter] = useState('');
    const [outcomeFilter, setOutcomeFilter] = useState('');
    const [dateFrom, setDateFrom] = useState('');
    const [dateTo, setDateTo] = useState('');

    const filtered = useMemo(() => {
        return MOCK_CALLS.filter(c => {
            if (search && !c.lead_name.toLowerCase().includes(search.toLowerCase()) && !c.lead_phone.includes(search)) return false;
            if (clientFilter && c.client !== clientFilter) return false;
            if (outcomeFilter && c.outcome !== outcomeFilter) return false;
            if (dateFrom && new Date(c.datetime) < new Date(dateFrom)) return false;
            if (dateTo && new Date(c.datetime) > new Date(dateTo + 'T23:59:59')) return false;
            return true;
        });
    }, [search, clientFilter, outcomeFilter, dateFrom, dateTo]);

    const pag = usePagination(filtered);

    const fmtDuration = (s) => {
        const m = Math.floor(s / 60), sec = s % 60;
        return m > 0 ? `${m}m ${sec}s` : `${sec}s`;
    };

    const stats = useMemo(() => {
        const thisMonth = MOCK_CALLS;
        const booked = thisMonth.filter(c => c.outcome === 'Booked').length;
        const totalDur = thisMonth.reduce((a, c) => a + c.duration, 0);
        const vms = thisMonth.filter(c => c.outcome === 'Voicemail').length;
        return {
            total: thisMonth.length,
            bookedRate: thisMonth.length > 0 ? ((booked / thisMonth.length) * 100).toFixed(1) : '0',
            avgDuration: thisMonth.length > 0 ? fmtDuration(Math.round(totalDur / thisMonth.length)) : '0s',
            voicemails: vms,
        };
    }, []);

    const exportCSV = () => {
        const header = 'Date/Time,Lead Name,Lead Phone,Client,Duration,Outcome,Notes\n';
        const rows = filtered.map(c =>
            `"${new Date(c.datetime).toLocaleString()}","${c.lead_name}","${c.lead_phone}","${c.client}","${fmtDuration(c.duration)}","${c.outcome}","${c.notes}"`
        ).join('\n');
        const blob = new Blob([header + rows], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = 'call-log.csv'; a.click();
        URL.revokeObjectURL(url);
    };

    return (
        <div>
            <div className="flex items-center justify-between mb-6">
                <div>
                    <h1 className="text-2xl font-bold">Call Log</h1>
                    <p className="text-sm text-gray-500 mt-1">{filtered.length} calls total</p>
                </div>
                <button onClick={exportCSV}
                    className="flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-medium transition-colors"
                    style={{ background: 'rgba(37,99,235,0.1)', color: '#2563EB', border: '1px solid rgba(37,99,235,0.25)' }}>
                    <Icon name="Download" size={16} /> Export CSV
                </button>
            </div>

            {/* Summary cards */}
            <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                {[
                    { label: 'Total Calls This Month', value: stats.total, icon: 'Phone' },
                    { label: 'Booked Rate', value: stats.bookedRate + '%', icon: 'Target' },
                    { label: 'Avg Call Duration', value: stats.avgDuration, icon: 'Clock' },
                    { label: 'Voicemails Left', value: stats.voicemails, icon: 'Voicemail' },
                ].map((s, i) => (
                    <div key={i} className="rounded-xl p-4" style={{ background: '#111', border: '1px solid #1F1F1F' }}>
                        <div className="flex items-center justify-between mb-3">
                            <span className="text-xs text-gray-500">{s.label}</span>
                            <Icon name={s.icon} size={16} color="#333" />
                        </div>
                        <div className="text-2xl font-bold">{s.value}</div>
                    </div>
                ))}
            </div>

            {/* Filters */}
            <div className="flex flex-wrap gap-3 mb-4">
                <div className="relative flex-1 min-w-[200px]">
                    <Icon name="Search" size={14} color="#555" className="absolute left-3 top-1/2 -translate-y-1/2 pointer-events-none" />
                    <input value={search} onChange={e => setSearch(e.target.value)}
                        placeholder="Search by name or phone..."
                        className="w-full rounded-lg pl-9 pr-3 py-2.5 text-sm" style={IS} onFocus={fb} onBlur={bb} />
                </div>
                <select value={clientFilter} onChange={e => setClientFilter(e.target.value)}
                    className="rounded-lg px-3 py-2.5 text-sm" style={IS}>
                    <option value="">All Clients</option>
                    {MOCK_CLIENTS.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                </select>
                <select value={outcomeFilter} onChange={e => setOutcomeFilter(e.target.value)}
                    className="rounded-lg px-3 py-2.5 text-sm" style={IS}>
                    <option value="">All Outcomes</option>
                    {['Booked', 'Not Interested', 'No Answer', 'Voicemail', 'Call Back'].map(o => <option key={o} value={o}>{o}</option>)}
                </select>
                <input type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)}
                    className="rounded-lg px-3 py-2.5 text-sm" style={IS} onFocus={fb} onBlur={bb} />
                <input type="date" value={dateTo} onChange={e => setDateTo(e.target.value)}
                    className="rounded-lg px-3 py-2.5 text-sm" style={IS} onFocus={fb} onBlur={bb} />
            </div>

            {/* Table */}
            <div className="rounded-xl overflow-hidden" style={{ background: '#111', border: '1px solid #1F1F1F' }}>
                <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                        <thead>
                            <tr style={{ borderBottom: '1px solid #1F1F1F' }}>
                                {['Date/Time', 'Lead Name', 'Lead Phone', 'Client', 'Duration', 'Outcome', '', 'Notes'].map(h => (
                                    <th key={h} className="px-4 py-3 text-left text-xs text-gray-500 font-medium">{h}</th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {pag.rows.map(c => (
                                <tr key={c.id} className="tbl-row" style={{ borderBottom: '1px solid #1A1A1A' }}>
                                    <td className="px-4 py-3 text-xs text-gray-400 whitespace-nowrap">{new Date(c.datetime).toLocaleString()}</td>
                                    <td className="px-4 py-3 font-medium whitespace-nowrap">{c.lead_name}</td>
                                    <td className="px-4 py-3 text-gray-400 text-xs whitespace-nowrap">{c.lead_phone}</td>
                                    <td className="px-4 py-3 text-gray-400 text-xs whitespace-nowrap">{c.client}</td>
                                    <td className="px-4 py-3 text-xs whitespace-nowrap">{fmtDuration(c.duration)}</td>
                                    <td className="px-4 py-3 whitespace-nowrap"><Badge status={c.outcome} /></td>
                                    <td className="px-4 py-3">
                                        <button className="text-gray-500 hover:text-blue-400 transition-colors" title="Play recording">
                                            <Icon name="Play" size={14} />
                                        </button>
                                    </td>
                                    <td className="px-4 py-3 text-xs text-gray-500 max-w-[250px] truncate">{c.notes}</td>
                                </tr>
                            ))}
                            {pag.rows.length === 0 && (
                                <tr><td colSpan={8} className="px-4 py-12 text-center text-gray-600">No calls match your filters</td></tr>
                            )}
                        </tbody>
                    </table>
                </div>
                {pag.totalPages > 1 && (
                    <div className="flex items-center justify-between px-4 py-3" style={{ borderTop: '1px solid #1F1F1F' }}>
                        <span className="text-xs text-gray-500">Page {pag.page} of {pag.totalPages} ({pag.total} calls)</span>
                        <div className="flex gap-1">
                            <button onClick={() => pag.setPage(Math.max(1, pag.page - 1))} disabled={pag.page === 1}
                                className="px-3 py-1.5 rounded text-xs disabled:opacity-30" style={{ background: '#1A1A1A' }}>Prev</button>
                            <button onClick={() => pag.setPage(Math.min(pag.totalPages, pag.page + 1))} disabled={pag.page === pag.totalPages}
                                className="px-3 py-1.5 rounded text-xs disabled:opacity-30" style={{ background: '#1A1A1A' }}>Next</button>
                        </div>
                    </div>
                )}
            </div>
        </div>
    );
}

        </div>
    );
}

// ════════════════════════════════════════════════════════════════════════════
// APP
// ════════════════════════════════════════════════════════════════════════════

function App() {
    const [page, setPage] = useState('builder');
    const [sbOpen, setSbOpen] = useState(false);
    const [loading, setLoading] = useState(true);
    const [demoMode, setDemoMode] = useState(false);

    useEffect(() => {
        (async () => {
            if (!sb) { setDemoMode(true); setLoading(false); return; }
            try {
                const { data: { session }, error } = await sb.auth.getSession();
                if (error || !session || session.user.email !== ADMIN_EMAIL) {
                    setDemoMode(true);
                }
            } catch(e) { setDemoMode(true); }
            setLoading(false);
        })();
    }, []);

    if (loading) return (
        <div className="h-full flex items-center justify-center">
            <div className="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin" />
        </div>
    );

    const pages = { builder: AgentBuilderPage, triggers: CallTriggersPage, calls: CallLogPage, bookings: BookingsPage };
    const Page = pages[page] || AgentBuilderPage;

    return (
        <div className="h-full flex">
            <Sidebar page={page} setPage={setPage} open={sbOpen} setOpen={setSbOpen} />
            <main className="flex-1 md:ml-60 min-h-full">
                <header className="h-14 flex items-center justify-between px-5 sticky top-0 z-10"
                    style={{ background: '#0A0A0A', borderBottom: '1px solid #1A1A1A' }}>
                    <div className="flex items-center gap-3">
                        <button className="md:hidden text-gray-400" onClick={() => setSbOpen(true)}>
                            <Icon name="Menu" size={20} />
                        </button>
                        <span className="text-sm text-gray-500">Voice Agent</span>
                    </div>
                    <div className="flex items-center gap-2">
                        {demoMode && (
                            <span className="text-[10px] px-2 py-0.5 rounded-full bg-yellow-500/10 text-yellow-400 border border-yellow-500/20">Demo Mode</span>
                        )}
                        <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold"
                            style={{ background: 'rgba(139,92,246,0.15)', color: '#A78BFA', border: '1px solid rgba(139,92,246,0.25)' }}>A</div>
                    </div>
                </header>
                <div className="p-6 max-w-6xl">
                    <Page />
                </div>
            </main>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
