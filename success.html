<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome — BrokerPipeline.ai</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0A0A0A;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
        .check-anim{animation:scaleIn .6s cubic-bezier(.175,.885,.32,1.275) both .3s}
        @keyframes scaleIn{from{opacity:0;transform:scale(0)}to{opacity:1;transform:scale(1)}}
        .check-ring{animation:ringPulse 2s ease-out infinite}
        @keyframes ringPulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,0.4)}70%{box-shadow:0 0 0 25px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
        .fade-up{animation:fadeUp .6s ease both}
        .fade-up-1{animation-delay:.5s}
        .fade-up-2{animation-delay:.7s}
        .fade-up-3{animation-delay:.9s}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useRef, useEffect, useState } = React;

function Icon({ name, size = 18, color = 'currentColor', className = '' }) {
    const ref = useRef(null);
    useEffect(() => {
        if (!ref.current || !lucide?.icons?.[name]) return;
        ref.current.innerHTML = '';
        const svg = lucide.createElement(lucide.icons[name]);
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        svg.setAttribute('stroke', color);
        svg.style.display = 'block';
        ref.current.appendChild(svg);
    }, [name, size, color]);
    return <span ref={ref} className={`inline-flex items-center ${className}`} />;
}

// Try to log subscription to Supabase
function logSubscription(subscriptionId, planName) {
    try {
        var sb = supabase.createClient(
            'https://glokxezbcrelrndcbhhs.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdsb2t4ZXpiY3JlbHJuZGNiaGhzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDYzMDc2MTUsImV4cCI6MjA2MTg4MzYxNX0.a5oR_2YJkUPOFNVv40cXuFMBb7VGmP8XGN6D_DBLuRs'
        );
        sb.from('subscriptions').insert({
            subscription_id: subscriptionId,
            plan: planName,
            created_at: new Date().toISOString(),
        }).then(function() {
            console.log('Subscription logged');
        });
    } catch (e) {
        console.warn('Could not log subscription to Supabase:', e);
    }
}

function SuccessPage() {
    var params = new URLSearchParams(window.location.search);
    var subscriptionId = params.get('subscription_id') || '';
    var planName = params.get('plan') || '';

    useEffect(function() {
        if (subscriptionId) {
            logSubscription(subscriptionId, planName);
        }
    }, []);

    var NEXT_STEPS = [
        { icon: 'Mail', text: 'Check your email for dashboard login credentials' },
        { icon: 'Calendar', text: 'Your onboarding call will be scheduled within 24 hours' },
        { icon: 'Rocket', text: 'Pipeline setup begins — leads start flowing in 48 hours' },
    ];

    return (
        <div className="min-h-screen flex items-center justify-center px-6 relative overflow-hidden">
            {/* Background glow */}
            <div
                className="absolute w-[500px] h-[500px] rounded-full pointer-events-none"
                style={{
                    top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
                    background: 'radial-gradient(circle, rgba(34,197,94,0.08) 0%, transparent 70%)'
                }}
            />

            <div className="relative z-10 text-center max-w-lg">
                {/* Green checkmark */}
                <div className="check-anim mb-8 inline-flex">
                    <div
                        className="check-ring w-24 h-24 rounded-full flex items-center justify-center"
                        style={{ background: 'rgba(34,197,94,0.12)', border: '2px solid rgba(34,197,94,0.3)' }}
                    >
                        <Icon name="Check" size={48} color="#22C55E" />
                    </div>
                </div>

                {/* Title */}
                <h1 className="fade-up fade-up-1 text-3xl md:text-4xl font-bold mb-4">
                    Welcome to BrokerPipeline!
                </h1>

                {/* Plan badge */}
                {planName && (
                    <div className="fade-up fade-up-1 mb-6">
                        <span className="inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full text-sm font-medium bg-blue-600/20 text-blue-400 border border-blue-500/30">
                            <Icon name="Zap" size={14} color="#60A5FA" />
                            {planName} Plan
                        </span>
                    </div>
                )}

                {/* Message */}
                <p className="fade-up fade-up-2 text-gray-400 text-lg leading-relaxed mb-8">
                    Your subscription is confirmed. We're setting everything up for you right now.
                </p>

                {/* Subscription ID */}
                {subscriptionId && (
                    <div className="fade-up fade-up-2 mb-8 px-4 py-3 rounded-xl border border-white/5 bg-white/[0.02]">
                        <p className="text-xs text-gray-500 mb-1">Subscription ID</p>
                        <p className="text-sm text-gray-300 font-mono">{subscriptionId}</p>
                    </div>
                )}

                {/* Next steps */}
                <div className="fade-up fade-up-2 mb-10 text-left">
                    <p className="text-sm font-semibold text-white mb-4 text-center">What happens next:</p>
                    <div className="space-y-3">
                        {NEXT_STEPS.map(function(step, i) {
                            return (
                                <div key={i} className="flex items-start gap-3 px-4 py-3 rounded-xl border border-white/5 bg-white/[0.02]">
                                    <div className="mt-0.5 flex-shrink-0 w-8 h-8 rounded-lg bg-blue-600/15 flex items-center justify-center">
                                        <Icon name={step.icon} size={16} color="#60A5FA" />
                                    </div>
                                    <p className="text-sm text-gray-300 leading-relaxed">{step.text}</p>
                                </div>
                            );
                        })}
                    </div>
                </div>

                {/* CTA Button */}
                <div className="fade-up fade-up-3">
                    <a
                        href="login.html"
                        className="inline-flex items-center gap-2 px-6 py-3 rounded-full bg-blue-600 text-white font-medium hover:bg-blue-500 transition"
                    >
                        <Icon name="LogIn" size={18} />
                        Login to Dashboard
                    </a>
                </div>

                {/* Subtle footer */}
                <p className="fade-up fade-up-3 mt-12 text-xs text-gray-600">
                    Questions? Email us at <a href="mailto:support@brokerpipeline.ai" className="text-gray-500 hover:text-white transition">support@brokerpipeline.ai</a>
                </p>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<SuccessPage />);
</script>
</body>
</html>
