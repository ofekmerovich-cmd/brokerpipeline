        function useFadeIn() {
            const ref = useRef(null);
            useEffect(() => {
                const observer = new IntersectionObserver(
                    ([entry]) => {
                        if (entry.isIntersecting) {
                            entry.target.classList.add('visible');
                        }
                    },
                    { threshold: 0.1 }
                );
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);
            return ref;
        }

        function Icon({ name, size = 24, className = '' }) {
            const ref = useRef(null);
            useEffect(() => {
                if (ref.current) {
                    ref.current.innerHTML = '';
                    const icon = lucide.createElement(lucide.icons[name]);
                    icon.setAttribute('width', size);
                    icon.setAttribute('height', size);
                    if (className) icon.setAttribute('class', className);
                    ref.current.appendChild(icon);
                }
            }, [name, size]);
            return <span ref={ref} className={`inline-flex ${className}`}></span>;
        }

        function ContactForm() {
            const ref = useFadeIn();
            const [form, setForm] = useState({ name: '', email: '', message: '' });
            const [status, setStatus] = useState(null);
            const [sending, setSending] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setSending(true);
                setStatus(null);
                try {
                    const { error } = await sb.from('contacts').insert({
                        name: form.name,
                        email: form.email,
                        message: form.message,
                    });
                    if (error) throw error;
                    setStatus('success');
                    setForm({ name: '', email: '', message: '' });
                } catch (err) {
                    setStatus('error');
                }
                setSending(false);
            };

            return (
                <section id="contact" className="py-24 px-6">
                    <div ref={ref} className="fade-in max-w-2xl mx-auto">
                        <div className="text-center mb-12">

                        <form onSubmit={handleSubmit} className="bg-dark-card border border-dark-border rounded-2xl p-8 space-y-5">

                                    required
                                    value={form.name}
                                    onChange={e => setForm({ ...form, name: e.target.value })}
                                    className="w-full bg-dark border border-dark-border rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 transition-colors"
                                    placeholder="Your name"
                                />
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400 mb-1.5">Email</label>
                                <input
                                    type="email"
                                    required
                                    value={form.email}
                                    onChange={e => setForm({ ...form, email: e.target.value })}
                                    className="w-full bg-dark border border-dark-border rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 transition-colors"
                                    placeholder="you@company.com"
                                />
                            </div>
                            <div>
                                <label className="block text-sm text-gray-400 mb-1.5">Message</label>
                                <textarea
                                    required
                                    rows={4}
                                    value={form.message}
                                    onChange={e => setForm({ ...form, message: e.target.value })}
                                    className="w-full bg-dark border border-dark-border rounded-xl px-4 py-3 text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 transition-colors resize-none"
                                    placeholder="Tell us about your business..."
                                />
                            </div>
                            <button
                                type="submit"
                                disabled={sending}
                                className="w-full bg-blue-500 hover:bg-blue-600 disabled:opacity-50 text-white font-medium py-3.5 rounded-full transition-colors"
                            >
                                {sending ? 'Sending...' : 'Send Message'}
                            </button>
                            {status === 'success' && (
                                <div className="flex items-center gap-2 text-green-400 text-sm justify-center pt-2">
                                    <Icon name="CheckCircle" size={16} />
                                    <span>We'll be in touch within 24 hours.</span>
                                </div>
                            )}
                            {status === 'error' && (
                                <div className="flex items-center gap-2 text-red-400 text-sm justify-center pt-2">
                                    <Icon name="AlertCircle" size={16} />
                                    <span>Something went wrong. Please try again.</span>
                                </div>
                            )}
                        </form>
                    </div>
                </section>
            );
        }

        function Footer() {

    <!-- Retell AI Web Call Widget -->
    <script src="https://cdn.jsdelivr.net/npm/retell-client-js-sdk@3/bundle/retell-client-js-sdk.es.js" type="module"></script>
    <div id="aria-call-btn" style="
        position:fixed; bottom:28px; right:28px; z-index:9999;
        background:#2563EB; color:#fff; border-radius:50px;
        padding:14px 24px; font-size:15px; font-weight:600;
        cursor:pointer; box-shadow:0 4px 24px rgba(37,99,235,0.4);
        display:flex; align-items:center; gap:10px;
        transition:all 0.2s ease; user-select:none;
    " onmouseenter="this.style.transform='scale(1.05)';this.style.boxShadow='0 6px 30px rgba(37,99,235,0.5)'"
       onmouseleave="this.style.transform='scale(1)';this.style.boxShadow='0 4px 24px rgba(37,99,235,0.4)'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        Talk to Aria
    </div>
    <style>
        @keyframes ariaPulse { 0%{box-shadow:0 0 0 0 rgba(220,38,38,0.4)} 70%{box-shadow:0 0 0 12px rgba(220,38,38,0)} 100%{box-shadow:0 0 0 0 rgba(220,38,38,0)} }
        .aria-live { animation: ariaPulse 1.5s ease-out infinite; }
    </style>
    <script type="module">
        const btn = document.getElementById('aria-call-btn');
        let isCalling = false;
        let retellClient = null;

        function setState(state) {
            btn.classList.remove('aria-live');
            switch(state) {
                case 'idle':
                    btn.style.background = '#2563EB';
                    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg> Talk to Aria';
                    break;
                case 'connecting':
                    btn.style.background = '#6B7280';
                    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation:spin 1s linear infinite"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg> Connecting...';
                    break;
                case 'live':
                    btn.style.background = '#DC2626';
                    btn.classList.add('aria-live');
                    btn.innerHTML = '<span style="width:10px;height:10px;background:#fff;border-radius:50%;display:inline-block"></span> Live with Aria — Click to end';
                    break;
                case 'ended':
                    btn.style.background = '#2563EB';
