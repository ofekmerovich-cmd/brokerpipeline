function Icon({ name, size = 18, color = 'currentColor', className = '' }) {
    const ref = useRef(null);
    useEffect(() => {
        if (!ref.current || !lucide?.icons?.[name]) return;
        ref.current.innerHTML = '';
        const svg = lucide.createElement(lucide.icons[name]);
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        svg.setAttribute('stroke', color);
        svg.style.display = 'block';
        svg.style.flexShrink = '0';
        ref.current.appendChild(svg);
    }, [name, size, color]);
    return <span ref={ref} className={`inline-flex items-center ${className}`} />;
}

function useCopy() {
    const [copied, setCopied] = useState('');
    const copy = useCallback((text, id) => {
        navigator.clipboard?.writeText(text);
        setCopied(id);
        setTimeout(() => setCopied(''), 2000);
    }, []);
    return [copied, copy];
}

                                                <Icon name={copied === `step-${s.num}` ? 'Check' : 'Copy'} size={11} color={copied === `step-${s.num}` ? '#22C55E' : undefined} />
                                                {copied === `step-${s.num}` ? 'Copied!' : 'Copy'}
                                            </button>
                                        </div>
                                        <pre className="p-4 text-xs text-green-400 overflow-x-auto"><code>{s.code}</code></pre>
                                    </div>
                                )}
                                {s.fields && (
                                    <div className="rounded-lg overflow-hidden" style={{ border: '1px solid #1A1A1A' }}>
                                        <div className="px-4 py-2" style={{ background: '#0D0D0D', borderBottom: '1px solid #1A1A1A' }}>
                                            <span className="text-[10px] text-gray-600 uppercase tracking-wider">Field Mapping</span>
                                        </div>
                                        <div className="divide-y divide-[#1A1A1A]">
                                            {s.fields.map((f, i) => (
                                                <div key={i} className="flex items-center px-4 py-2.5" style={{ background: '#0A0A0A' }}>
                                                    <span className="text-xs text-gray-400 w-36">{f.from}</span>
                                                    <Icon name="ArrowRight" size={12} color="#333" className="mx-3" />
                                                    <code className="text-xs text-blue-400">{f.to}</code>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>
                ))}
            </div>
        </div>
    );
}

// SECTION 4 — API Keys Manager
// ════════════════════════════════════════════════════════════════════════════

const KEY_DEFS = [
    { id: 'apollo', name: 'Apollo API Key', icon: 'Search', color: '#6366F1', updated: '2026-04-28T10:00:00Z' },
    { id: 'clay', name: 'Clay API Key', icon: 'Layers', color: '#F97316', updated: '2026-04-25T14:30:00Z' },
    { id: 'instantly', name: 'Instantly API Key', icon: 'Mail', color: '#2563EB', updated: '2026-05-01T09:15:00Z' },
    { id: 'retell', name: 'Retell API Key', icon: 'Phone', color: '#8B5CF6', updated: '2026-04-30T16:45:00Z' },
    { id: 'twilio_sid', name: 'Twilio Account SID', icon: 'Smartphone', color: '#EF4444', updated: '2026-04-20T11:00:00Z' },
    { id: 'twilio_auth', name: 'Twilio Auth Token', icon: 'Smartphone', color: '#EF4444', updated: '2026-04-20T11:00:00Z' },
    { id: 'calendly', name: 'Calendly API Key', icon: 'Calendar', color: '#22C55E', updated: null },
];

function APIKeysPage() {
    const [keys, setKeys] = useState(() =>
        KEY_DEFS.reduce((acc, k) => ({ ...acc, [k.id]: k.updated ? '•'.repeat(32) : '' }), {})
    );
    const [visible, setVisible] = useState({});
    const [saving, setSaving] = useState('');
    const [saved, setSaved] = useState({});

    const toggleVis = (id) => setVisible(v => ({ ...v, [id]: !v[id] }));
    const updateKey = (id, val) => setKeys(k => ({ ...k, [id]: val }));

    const saveKey = (id) => {
        setSaving(id);
        setTimeout(() => {
            setSaving('');
            setSaved(prev => ({ ...prev, [id]: true }));
            setTimeout(() => setSaved(prev => ({ ...prev, [id]: false })), 2000);
        }, 800);
    };

    return (
        <div>
            <div className="mb-6">
                <h1 className="text-2xl font-bold">API Keys Manager</h1>
                <p className="text-sm text-gray-500 mt-1">Securely store credentials for all external services</p>
            </div>

            {/* Warning banner */}
            <div className="rounded-xl p-4 mb-6 flex items-center gap-3"
                style={{ background: 'rgba(234,179,8,0.06)', border: '1px solid rgba(234,179,8,0.15)' }}>
                <Icon name="ShieldCheck" size={18} color="#EAB308" />
                <div>
                    <div className="text-xs font-medium text-yellow-400">Encrypted Storage</div>
                    <div className="text-[10px] text-gray-500">These keys are encrypted and never exposed to clients. Stored in Supabase Vault.</div>
                </div>
            </div>

            <div className="space-y-3">
                {KEY_DEFS.map(k => (
                    <div key={k.id} className="rounded-xl p-4" style={{ background: '#111', border: '1px solid #1F1F1F' }}>
                        <div className="flex items-center gap-4">
                            <div className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0"
                                style={{ background: `${k.color}15` }}>
                                <Icon name={k.icon} size={16} color={k.color} />
                            </div>
                            <div className="flex-1 min-w-0">
                                <div className="text-sm font-medium mb-1">{k.name}</div>
                                <div className="flex items-center gap-2">
                                    <input
                                        type={visible[k.id] ? 'text' : 'password'}
                                        value={keys[k.id]}
                                        onChange={e => updateKey(k.id, e.target.value)}
                                        placeholder="Enter API key..."
                                        className="flex-1 rounded-lg px-3 py-2 text-xs font-mono"
                                        style={IS} onFocus={fb} onBlur={bb}
                                    />
                                    <button onClick={() => toggleVis(k.id)}
                                        className="p-2 rounded-lg text-gray-500 hover:text-white transition-colors"
                                        style={{ border: '1px solid #1A1A1A' }}>
                                        <Icon name={visible[k.id] ? 'EyeOff' : 'Eye'} size={14} />
                                    </button>
                                    <button onClick={() => saveKey(k.id)}
                                        disabled={saving === k.id}
                                        className="px-3 py-2 rounded-lg text-xs font-medium transition-colors"
                                        style={{
                                            background: saved[k.id] ? 'rgba(34,197,94,0.15)' : 'rgba(37,99,235,0.1)',
                                            color: saved[k.id] ? '#22C55E' : '#2563EB',
                                            border: `1px solid ${saved[k.id] ? 'rgba(34,197,94,0.25)' : 'rgba(37,99,235,0.25)'}`,
                                            opacity: saving === k.id ? 0.5 : 1,
                                        }}>
                                        {saving === k.id ? '...' : saved[k.id] ? 'Saved!' : 'Save'}
                                    </button>
                                </div>
                                {k.updated && (
                                    <div className="text-[10px] text-gray-600 mt-1.5">
                                        Last updated: {new Date(k.updated).toLocaleDateString()}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                ))}
            </div>
        </div>
    );
}

// SECTION 5 — System Health Dashboard
// ════════════════════════════════════════════════════════════════════════════

const SERVICES = [
    { id: 'apollo', name: 'Apollo API', icon: 'Search', status: 'Operational', uptime: 99.8, latency: 142 },
    { id: 'clay', name: 'Clay API', icon: 'Layers', status: 'Operational', uptime: 99.9, latency: 89 },

    { id: 7, service: 'Supabase Database', message: 'Connection pool briefly exhausted', time: '2026-05-03T11:05:00Z', severity: 'error' },
    { id: 8, service: 'Retell AI', message: 'Voice synthesis latency above threshold', time: '2026-05-02T15:40:00Z', severity: 'warning' },
    { id: 9, service: 'Instantly API', message: 'Campaign webhook delivery delayed by 10 min', time: '2026-05-02T09:20:00Z', severity: 'warning' },
    { id: 10, service: 'Clay API', message: 'LinkedIn enrichment temporarily unavailable', time: '2026-05-01T14:00:00Z', severity: 'error' },
];

function SystemHealthPage() {
    const [lastRefresh, setLastRefresh] = useState(new Date());
    const [refreshing, setRefreshing] = useState(false);

    useEffect(() => {
        const iv = setInterval(() => {
            setRefreshing(true);
            setTimeout(() => { setRefreshing(false); setLastRefresh(new Date()); }, 500);
        }, 60000);
        return () => clearInterval(iv);
    }, []);

    const refresh = () => {
        setRefreshing(true);
        setTimeout(() => { setRefreshing(false); setLastRefresh(new Date()); }, 500);
    };

    const allOk = SERVICES.every(s => s.status === 'Operational');
    const dotColor = { Operational: '#22C55E', Degraded: '#EAB308', Down: '#EF4444' };

    return (
        <div>
            <div className="flex items-center justify-between mb-6">
                <div>
                    <h1 className="text-2xl font-bold">System Health</h1>
                    <p className="text-sm text-gray-500 mt-1">Real-time status of all connected services</p>
                </div>
                <div className="flex items-center gap-3">
                    <span className="text-[10px] text-gray-600">
                        Last check: {lastRefresh.toLocaleTimeString()}
                    </span>
                    <button onClick={refresh}
                        className="flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs text-gray-400 transition-colors"
                        style={{ border: '1px solid #1A1A1A' }}>
                        <Icon name="RefreshCw" size={12} className={refreshing ? 'animate-spin' : ''} /> Refresh
                    </button>
                </div>
            </div>

            {/* Overall status */}
            <div className="rounded-xl p-4 mb-6 flex items-center gap-3"
                style={{
                    background: allOk ? 'rgba(34,197,94,0.06)' : 'rgba(234,179,8,0.06)',
                    border: `1px solid ${allOk ? 'rgba(34,197,94,0.15)' : 'rgba(234,179,8,0.15)'}`,
                }}>
                <div className="w-3 h-3 rounded-full" style={{ background: allOk ? '#22C55E' : '#EAB308' }} />
                <span className="text-sm font-medium" style={{ color: allOk ? '#22C55E' : '#EAB308' }}>
                    {allOk ? 'All Systems Operational' : 'Some Services Degraded'}
                </span>
                <span className="text-[10px] text-gray-500 ml-auto">Auto-refreshes every 60s</span>
            </div>

            {/* Services grid */}
            <div className="space-y-2 mb-6">
                {SERVICES.map(s => (
                    <div key={s.id} className="rounded-xl p-4 flex items-center gap-4"
                        style={{ background: '#111', border: '1px solid #1F1F1F' }}>
                        <div className="w-2.5 h-2.5 rounded-full flex-shrink-0" style={{ background: dotColor[s.status] }} />
                        <Icon name={s.icon} size={16} color="#555" />
                        <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2">
                                <span className="text-sm font-medium">{s.name}</span>
                                <Badge status={s.status} />
                            </div>
                        </div>
                        <div className="flex items-center gap-6 text-xs text-gray-500 flex-shrink-0">
                            <span>Latency: <span className={s.latency > 500 ? 'text-yellow-400' : 'text-gray-400'}>{s.latency}ms</span></span>
                            <div className="flex items-center gap-2 w-40">
                                <div className="flex-1 h-1.5 rounded-full overflow-hidden" style={{ background: '#1A1A1A' }}>
                                    <div className="h-full rounded-full" style={{
                                        width: `${s.uptime}%`,
                                        background: s.uptime >= 99.5 ? '#22C55E' : s.uptime >= 98 ? '#EAB308' : '#EF4444',
                                    }} />
                                </div>
                                <span className="text-[10px] w-12 text-right" style={{
                                    color: s.uptime >= 99.5 ? '#22C55E' : s.uptime >= 98 ? '#EAB308' : '#EF4444',
                                }}>{s.uptime}%</span>
                            </div>
                        </div>
                    </div>
                ))}
            </div>

            {/* Incident Log */}
            <div className="rounded-xl overflow-hidden" style={{ background: '#111', border: '1px solid #1F1F1F' }}>
                <div className="px-5 py-4 flex items-center justify-between" style={{ borderBottom: '1px solid #1F1F1F' }}>
                    <h3 className="text-sm font-semibold">Incident Log</h3>
                    <span className="text-[10px] text-gray-500">Last 10 events</span>
                </div>
                <div className="divide-y divide-[#1A1A1A]">
                    {INCIDENTS.map(inc => (
                        <div key={inc.id} className="flex items-start gap-3 px-5 py-3">
                            <div className="w-1.5 h-1.5 rounded-full mt-1.5 flex-shrink-0"
                                style={{ background: inc.severity === 'error' ? '#EF4444' : '#EAB308' }} />
                            <div className="flex-1 min-w-0">
                                <div className="flex items-center gap-2 mb-0.5">
                                    <span className="text-xs font-medium">{inc.service}</span>
                                    <span className={`text-[10px] ${inc.severity === 'error' ? 'text-red-400' : 'text-yellow-400'}`}>
                                        {inc.severity}
                                    </span>
                                </div>
                                <p className="text-xs text-gray-500">{inc.message}</p>
                            </div>
                            <span className="text-[10px] text-gray-600 whitespace-nowrap flex-shrink-0">
                                {new Date(inc.time).toLocaleString()}
                            </span>
                        </div>
                    ))}
                </div>
            </div>
        </div>
    );
}

// APP
// ════════════════════════════════════════════════════════════════════════════

function App() {
    const [page, setPage] = useState('hub');
    const [sbOpen, setSbOpen] = useState(false);
    const [loading, setLoading] = useState(true);
    const [demoMode, setDemoMode] = useState(false);

    useEffect(() => {
        (async () => {
            if (!sb) { setDemoMode(true); setLoading(false); return; }
            try {
                const { data: { session }, error } = await sb.auth.getSession();
                if (error || !session || session.user.email !== ADMIN_EMAIL) setDemoMode(true);
            } catch(e) { setDemoMode(true); }
            setLoading(false);
        })();
    }, []);

    if (loading) return (
        <div className="h-full flex items-center justify-center">
            <div className="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin" />
        </div>
    );

    const pages = {
        hub: IntegrationHubPage,
        webhooks: WebhookCenterPage,
        guide: MakeGuidePage,
        keys: APIKeysPage,
        health: SystemHealthPage,
    };
    const Page = pages[page] || IntegrationHubPage;

    return (
        <div className="h-full flex">
            <Sidebar page={page} setPage={setPage} open={sbOpen} setOpen={setSbOpen} />
            <main className="flex-1 md:ml-60 min-h-full">
                <header className="h-14 flex items-center justify-between px-5 sticky top-0 z-10"
                    style={{ background: '#0A0A0A', borderBottom: '1px solid #1A1A1A' }}>
                    <div className="flex items-center gap-3">
                        <button className="md:hidden text-gray-400" onClick={() => setSbOpen(true)}>
                            <Icon name="Menu" size={20} />
                        </button>
                        <span className="text-sm text-gray-500">Integrations</span>
                    </div>
                    <div className="flex items-center gap-2">
                        {demoMode && (
                            <span className="text-[10px] px-2 py-0.5 rounded-full bg-yellow-500/10 text-yellow-400 border border-yellow-500/20">Demo Mode</span>
                        )}
                        <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold"
                            style={{ background: 'rgba(37,99,235,0.15)', color: '#60A5FA', border: '1px solid rgba(37,99,235,0.25)' }}>A</div>
                    </div>
                </header>
                <div className="p-6 max-w-6xl">
                    <Page />
                </div>
            </main>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
