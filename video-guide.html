// -- Icon ---------------------------------------------------------------------
function Icon({ name, size = 18, color = 'currentColor', className = '' }) {
    const ref = useRef(null);
    useEffect(() => {
        if (!ref.current || !lucide?.icons?.[name]) return;
        ref.current.innerHTML = '';
        const svg = lucide.createElement(lucide.icons[name]);
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        svg.setAttribute('stroke', color);
        svg.style.display = 'block';
        svg.style.flexShrink = '0';
        ref.current.appendChild(svg);
    }, [name, size, color]);
    return <span ref={ref} className={`inline-flex items-center ${className}`} />;
}

// -- Accordion Section --------------------------------------------------------
function AccordionSection({ icon, title, children, defaultOpen = false }) {
    const [open, setOpen] = useState(defaultOpen);
    const bodyRef = useRef(null);
    const [maxH, setMaxH] = useState(defaultOpen ? '2000px' : '0');

    useEffect(() => {
        if (bodyRef.current) {
            setMaxH(open ? bodyRef.current.scrollHeight + 'px' : '0');
        }
    }, [open]);

    return (
        <div className="rounded-xl overflow-hidden" style={{ background: '#111', border: '1px solid #1A1A1A' }}>
            <button
                onClick={() => setOpen(!open)}
                className="w-full flex items-center gap-3 px-5 py-4 text-left transition-colors"
                onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.02)'}
                onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
            >
                <div className="w-8 h-8 rounded-lg flex items-center justify-center shrink-0" style={{ background: 'rgba(37,99,235,0.12)' }}>
                    <Icon name={icon} size={16} color="#2563EB" />

                style={{ maxHeight: maxH }}
            >

                    {children}

        </div>
    );
}

// -- Root App -----------------------------------------------------------------
function App() {
    const [sbOpen, setSbOpen]   = useState(false);
    const [loading, setLoading] = useState(true);
    const [user, setUser]       = useState(null);

    useEffect(() => {
        (async () => {
            try {
                if (sb) {
                    const { data: { session }, error } = await sb.auth.getSession();
                    if (error || !session || session.user.email !== ADMIN_EMAIL) {
                        setUser({ email: ADMIN_EMAIL });
                        setLoading(false);
                        return;
                    }
                    setUser(session.user);
                } else {
                    setUser({ email: ADMIN_EMAIL });
                }
            } catch (err) {
                console.warn('Init failed, using demo mode:', err);
                setUser({ email: ADMIN_EMAIL });
            }
            setLoading(false);
        })();
    }, []);

    if (loading) {
        return (
            <div className="h-screen flex items-center justify-center" style={{ background: '#0A0A0A' }}>
                <div className="flex items-center gap-3 text-gray-400 text-sm">
                    <div className="w-4 h-4 rounded-full border-2 border-t-transparent animate-spin"
                         style={{ borderColor: '#2563EB', borderTopColor: 'transparent' }} />
                    Loading...
                </div>
            </div>
        );
    }

    return (
        <div className="h-screen flex overflow-hidden" style={{ background: '#0A0A0A' }}>
            <Sidebar open={sbOpen} setOpen={setSbOpen} />
            <div className="flex-1 flex flex-col md:ml-60 overflow-hidden">
                <TopBar open={sbOpen} setOpen={setSbOpen} />
                <main className="flex-1 overflow-y-auto p-5 md:p-6">
                    <VideoGuidePage />
                </main>
            </div>
        </div>
    );
}
