  CREATE TABLE leads (
    id           uuid PRIMARY KEY DEFAULT gen_random_uuid(),

    Area = () => null, AreaChart = () => null,
} = _Recharts;

// ResponsiveContainer from the Recharts UMD bundle doesn't measure correctly
// in a CDN + Babel standalone setup. This hook measures the parent instead.
function useContainerSize() {
    const ref = useRef(null);
    const [size, setSize] = useState({ width: 0, height: 0 });
    useEffect(() => {
        if (!ref.current) return;
        const update = () => {
            const { width, height } = ref.current.getBoundingClientRect();
            setSize({ width: Math.round(width), height: Math.round(height) });
        };
        update();
        const ro = new ResizeObserver(update);
        ro.observe(ref.current);
        return () => ro.disconnect();
    }, []);
    return [ref, size];
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function downloadCSV(data, filename) {
    if (!data.length) return;
    const headers = Object.keys(data[0]);
    const rows = data.map(row =>
        headers.map(h => `"${String(row[h] ?? '').replace(/"/g,'""')}"`).join(',')
    );
    const csv = [headers.join(','), ...rows].join('\n');
    const url = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    Object.assign(document.createElement('a'), { href: url, download: filename }).click();
    URL.revokeObjectURL(url);
}

function fmtDateTime(dt) {
    return new Date(dt).toLocaleString('en-US', {
        month: 'short', day: 'numeric', year: 'numeric',
        hour: 'numeric', minute: '2-digit', hour12: true,
    });
}

// ── Icon ──────────────────────────────────────────────────────────────────────
function Icon({ name, size = 18, color = 'currentColor', className = '' }) {
    const ref = useRef(null);
    useEffect(() => {
        if (!ref.current || !lucide?.icons?.[name]) return;
        ref.current.innerHTML = '';
        const svg = lucide.createElement(lucide.icons[name]);
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        svg.setAttribute('stroke', color);
        svg.style.display = 'block';
        svg.style.flexShrink = '0';
        ref.current.appendChild(svg);
    }, [name, size, color]);
    return <span ref={ref} className={`inline-flex items-center ${className}`} />;
}

        const matchText = !q ||
            l.name.toLowerCase().includes(q) ||
            l.company.toLowerCase().includes(q) ||
            l.email.toLowerCase().includes(q);
        const matchStatus = statusFilter === 'All' || l.status === statusFilter;
        return matchText && matchStatus;
    });

    return (
        <div className="space-y-5">
            {/* Header */}
            <div className="flex items-center justify-between">
                <div>
                    <h1 className="text-lg font-semibold">My Leads</h1>
                    <p className="text-sm text-gray-500 mt-0.5">{leads.length} total this month</p>
                </div>
                <div className="flex items-center gap-3">
                    {lastUpdated && (
                        <span className="text-xs text-gray-500">
                            Last updated: {lastUpdated.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}
                        </span>
                    )}
                    <button
                        onClick={refreshLeads}
                        disabled={refreshing}
                        className="flex items-center gap-2 px-3.5 py-2 rounded-xl text-sm text-gray-300 transition-colors"
                        style={{ border: '1px solid #1F1F1F', opacity: refreshing ? 0.5 : 1 }}
                        onMouseEnter={e => { if (!refreshing) e.currentTarget.style.borderColor = '#333'; }}
                        onMouseLeave={e => e.currentTarget.style.borderColor = '#1F1F1F'}
                    >
                        <span style={{ display: 'inline-flex', animation: refreshing ? 'spin 1s linear infinite' : 'none' }}>
                            <Icon name="RefreshCw" size={15} />
                        </span>
                        Refresh
                    </button>
                    <button
                        onClick={() => downloadCSV(filtered, 'leads.csv')}
                        className="flex items-center gap-2 px-3.5 py-2 rounded-lg text-sm text-gray-300 hover:text-white transition-colors"
                        style={{ border: '1px solid #1A1A1A' }}
                        onMouseEnter={e => e.currentTarget.style.borderColor = '#333'}
                        onMouseLeave={e => e.currentTarget.style.borderColor = '#1A1A1A'}
                    >
                        <Icon name="Download" size={15} />
                        Export CSV
                    </button>
                </div>
            </div>

            {/* Filters */}
            <div className="flex flex-col sm:flex-row gap-3">
                <div className="relative flex-1">
                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-500 pointer-events-none">
                        <Icon name="Search" size={15} />
                    </span>
                    <input
                        type="text"
                        placeholder="Search by name, company, email…"
                        value={search}
                        onChange={e => setSearch(e.target.value)}
                        className="w-full rounded-lg pl-9 pr-4 py-2.5 text-sm text-white placeholder-gray-600 transition-colors"
                        style={{ background: '#111', border: '1px solid #1A1A1A' }}
                        onFocus={e => e.target.style.borderColor = '#2563EB'}
                        onBlur={e => e.target.style.borderColor = '#1A1A1A'}
                    />
                </div>
                <select
                    value={statusFilter}
                    onChange={e => setStatusFilter(e.target.value)}
                    className="rounded-lg px-3 py-2.5 text-sm text-gray-300 transition-colors"
                    style={{ background: '#111', border: '1px solid #1A1A1A', color: '#ccc' }}
                    onFocus={e => e.target.style.borderColor = '#2563EB'}
                    onBlur={e => e.target.style.borderColor = '#1A1A1A'}
                >
                    {['All','New','Contacted','Replied','Booked'].map(s =>
                        <option key={s} value={s} style={{ background: '#111' }}>{s}</option>
                    )}
                </select>
            </div>

            {/* Table */}
            <div
                className="rounded-xl overflow-hidden"
                style={{ border: '1px solid #1A1A1A' }}
            >
                <div className="overflow-x-auto">
                    <table className="w-full text-sm">
                        <thead>
                            <tr style={{ borderBottom: '1px solid #1A1A1A', background: '#0D0D0D' }}>
                                {['Name','Company','Email','Phone','Specialty','Score','Status','Date Added'].map(h => (
                                    <th key={h} className="px-4 py-3 text-left text-xs font-medium whitespace-nowrap"
                                        style={{ color: '#555', letterSpacing: '0.05em' }}>
                                        {h}
                                    </th>
                                ))}
                            </tr>
                        </thead>
                        <tbody>
                            {filtered.length === 0 ? (
                                <tr>
                                    <td colSpan={8} className="px-4 py-10 text-center text-sm text-gray-500">
                                        No leads match your search
                                    </td>
                                </tr>
                            ) : filtered.map((l, i) => (
                                <tr key={l.id} className="tbl-row transition-colors"
                                    style={{ borderBottom: i < filtered.length - 1 ? '1px solid #141414' : 'none', background: '#111' }}>
                                    <td className="px-4 py-3 font-medium whitespace-nowrap">{l.name}</td>
                                    <td className="px-4 py-3 whitespace-nowrap" style={{ color: '#9CA3AF' }}>{l.company}</td>
                                    <td className="px-4 py-3 whitespace-nowrap" style={{ color: '#9CA3AF' }}>{l.email}</td>
                                    <td className="px-4 py-3 whitespace-nowrap" style={{ color: '#9CA3AF' }}>{l.phone}</td>
                                    <td className="px-4 py-3 whitespace-nowrap" style={{ color: '#9CA3AF' }}>{l.specialty}</td>
                                    <td className="px-4 py-3 whitespace-nowrap font-semibold"
                                        style={{ color: l.score >= 8 ? '#22C55E' : l.score >= 6 ? '#EAB308' : '#EF4444' }}>
                                        {l.score}/10
                                    </td>
                                    <td className="px-4 py-3 whitespace-nowrap"><Badge status={l.status} /></td>
                                    <td className="px-4 py-3 whitespace-nowrap" style={{ color: '#9CA3AF' }}>{l.date_added}</td>
                                </tr>

                        </tbody>

            </div>

            <p className="text-xs" style={{ color: '#444' }}>
                Showing {filtered.length} of {leads.length} leads
            </p>
        </div>
    );
}

// ── Appointments page ─────────────────────────────────────────────────────────
function AppointmentsPage({ appointments: init }) {
    const [appts, setAppts] = useState(init);
    const [editing, setEditing] = useState({});
    const [drafts, setDrafts]   = useState({});

    const saveNotes = async (id) => {
        const notes = drafts[id] ?? '';
        setAppts(prev => prev.map(a => a.id === id ? { ...a, notes } : a));
        setEditing(prev => ({ ...prev, [id]: false }));
        if (sb) await sb.from('appointments').update({ notes }).eq('id', id);
    };

    const upcoming  = appts.filter(a => a.status === 'Upcoming').length;

    return (
        <div className="space-y-5">
            <div>
                <h1 className="text-lg font-semibold">Appointments</h1>
                <p className="text-sm text-gray-500 mt-0.5">
                    {upcoming} upcoming meeting{upcoming !== 1 ? 's' : ''}
                </p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                {appts.map(a => (
                    <div
                        key={a.id}
                        className="rounded-xl p-5 transition-colors"
                        style={{ background: '#111', border: '1px solid #1A1A1A' }}
                    >
                        {/* Header */}
                        <div className="flex items-start justify-between mb-4">
                            <div>
                                <h3 className="font-medium">{a.prospect_name}</h3>
                                <p className="text-sm mt-0.5" style={{ color: '#9CA3AF' }}>{a.company}</p>
                            </div>
                            <Badge status={a.status} />
                        </div>

                        {/* Meta */}
                        <div className="space-y-2 mb-4">
                            <div className="flex items-center gap-2 text-sm" style={{ color: '#9CA3AF' }}>
                                <Icon name="CalendarDays" size={14} />
                                {fmtDateTime(a.meeting_datetime)}
                            </div>
                            <div className="flex items-center gap-2 text-sm" style={{ color: '#9CA3AF' }}>
                                <Icon name="Tag" size={14} />
                                {a.specialty}
                            </div>
                        </div>

                        {/* Notes */}
                        <div>
                            <div className="flex items-center justify-between mb-1.5">
                                <span className="text-xs font-medium" style={{ color: '#555', letterSpacing: '0.06em' }}>NOTES</span>
                                <button
                                    onClick={() => {
                                        if (editing[a.id]) {
                                            setEditing(prev => ({ ...prev, [a.id]: false }));
                                        } else {
                                            setDrafts(prev => ({ ...prev, [a.id]: a.notes ?? '' }));
                                            setEditing(prev => ({ ...prev, [a.id]: true }));
                                        }
                                    }}
                                    className="text-xs transition-colors"
                                    style={{ color: editing[a.id] ? '#9CA3AF' : '#2563EB' }}
                                >
                                    {editing[a.id] ? 'Cancel' : 'Edit'}
                                </button>
                            </div>

                            {editing[a.id] ? (
                                <div>
                                    <textarea
                                        rows={3}
                                        value={drafts[a.id] ?? ''}
                                        onChange={e => setDrafts(prev => ({ ...prev, [a.id]: e.target.value }))}
                                        className="w-full rounded-lg px-3 py-2.5 text-sm resize-none transition-colors"
                                        style={{ background: '#0A0A0A', border: '1px solid #2563EB', color: '#e5e7eb' }}
                                    />
                                    <button
                                        onClick={() => saveNotes(a.id)}
                                        className="mt-2 text-xs px-3 py-1.5 rounded-lg font-medium text-white transition-colors"
                                        style={{ background: '#2563EB' }}
                                        onMouseEnter={e => e.currentTarget.style.background = '#1D4ED8'}
                                        onMouseLeave={e => e.currentTarget.style.background = '#2563EB'}
                                    >
                                        Save Notes
                                    </button>
                                </div>
                            ) : (
                                <p
                                    className="text-sm rounded-lg px-3 py-2.5"
                                    style={{ background: '#0D0D0D', color: a.notes ? '#9CA3AF' : '#444', fontStyle: a.notes ? 'normal' : 'italic' }}
                                >
                                    {a.notes || 'No notes yet'}
                                </p>
                            )}
                        </div>
                    </div>
                ))}
            </div>
        </div>
    );
}

// ── Reports page (enhanced) ──────────────────────────────────────────────────

    const bestWeekIdx = reports.length > 0 ? reports.reduce((best, r, i) => r.appointments > reports[best].appointments ? i : best, 0) : -1;
    const worstWeekIdx = reports.length > 0 ? reports.reduce((worst, r, i) => r.appointments < reports[worst].appointments ? i : worst, 0) : -1;

    const chartData = reports.map(r => ({
        week: r.week.split(' – ')[0].replace(/\s+/g,' ').slice(0,6),

            {/* Export section */}

                        <Icon name="Download" size={16} /> Download CSV
                    </button>
                </div>
            </div>
        </div>
    );
}

// ── ROI Calculator page ──────────────────────────────────────────────────────
function ROIPage({ appointments }) {
    const realAppts = appointments ? appointments.filter(a => a.status !== 'No-show').length : 5;
    const [apptsPerMonth, setApptsPerMonth] = useState(realAppts || 5);
    const [closeRate, setCloseRate] = useState(25);
    const [policyValue, setPolicyValue] = useState(8000);
    const [annualPremium, setAnnualPremium] = useState(2400);
    const [planCost] = useState(3497);
    const [shared, setShared] = useState(false);

    const newClients = (apptsPerMonth * closeRate / 100);
    const monthlyRevenue = newClients * policyValue;
    const annualRecurring = newClients * annualPremium * 12;
    const roiMultiple = planCost > 0 ? (monthlyRevenue / planCost) : 0;
    const roiPct = planCost > 0 ? ((monthlyRevenue - planCost) / planCost * 100) : 0;

    const roiColor = roiMultiple >= 2 ? '#22C55E' : roiMultiple >= 1 ? '#EAB308' : '#EF4444';

    const shareResults = () => {
        setShared(true);
        setTimeout(() => setShared(false), 2000);
    };

    function Slider({ label, value, onChange, min, max, step, prefix, suffix }) {
        return (
            <div className="mb-5">
                <div className="flex items-center justify-between mb-2">
                    <label className="text-xs text-gray-400">{label}</label>
                    <div className="flex items-center gap-1">
                        {prefix && <span className="text-xs text-gray-500">{prefix}</span>}
                        <input type="number" value={value} onChange={e => onChange(parseFloat(e.target.value) || 0)}
                            className="w-20 rounded-lg px-2 py-1 text-sm text-right"
                            style={{ background: '#0A0A0A', border: '1px solid #1A1A1A', color: '#e5e7eb' }} />
                        {suffix && <span className="text-xs text-gray-500">{suffix}</span>}
                    </div>
                </div>
                <input type="range" min={min} max={max} step={step} value={value}
                    onChange={e => onChange(parseFloat(e.target.value))}
                    className="w-full h-1.5 rounded-full appearance-none cursor-pointer"
                    style={{ background: `linear-gradient(to right, #2563EB ${((value-min)/(max-min))*100}%, #1A1A1A ${((value-min)/(max-min))*100}%)` }} />
            </div>
        );
    }

    return (
        <div className="space-y-6">
            <div>
                <h1 className="text-lg font-semibold">ROI Calculator</h1>
                <p className="text-sm text-gray-500 mt-0.5">See what BrokerPipeline is worth to your business</p>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                {/* Inputs */}
                <div className="rounded-xl p-6" style={{ background: '#111', border: '1px solid #1A1A1A' }}>
                    <h3 className="text-sm font-semibold mb-5">Your Numbers</h3>
                    <Slider label="Appointments per month" value={apptsPerMonth} onChange={setApptsPerMonth}
                        min={1} max={50} step={1} />
                    <Slider label="Your close rate" value={closeRate} onChange={setCloseRate}
                        min={5} max={80} step={1} suffix="%" />
                    <Slider label="Average policy value" value={policyValue} onChange={setPolicyValue}
                        min={1000} max={50000} step={500} prefix="$" />
                    <Slider label="Average annual premium" value={annualPremium} onChange={setAnnualPremium}
                        min={500} max={20000} step={100} prefix="$" />
                </div>

                {/* Outputs */}
                <div className="space-y-4">
                    {/* Big ROI number */}
                    <div className="rounded-xl p-8 text-center" style={{ background: '#111', border: '1px solid #1A1A1A' }}>
                        <div className="text-xs text-gray-500 uppercase tracking-wider mb-2">Your Estimated ROI</div>
                        <div className="text-6xl font-bold mb-2" style={{ color: roiColor }}>
                            {roiMultiple.toFixed(1)}x
                        </div>
                        <div className="text-sm" style={{ color: roiColor }}>
                            {roiMultiple >= 2 ? 'Excellent return' : roiMultiple >= 1 ? 'Positive return' : 'Below breakeven'}
                        </div>
                    </div>

                    {/* Output stats */}
                    <div className="grid grid-cols-2 gap-3">
                        {[
                            { label: 'New Clients/Mo', value: newClients.toFixed(1), icon: 'UserPlus' },
                            { label: 'New Revenue/Mo', value: `$${monthlyRevenue.toLocaleString()}`, icon: 'DollarSign' },
                            { label: 'Annual Recurring', value: `$${annualRecurring.toLocaleString()}`, icon: 'TrendingUp' },
                            { label: 'ROI vs Cost', value: `${roiPct.toFixed(0)}%`, icon: 'Target' },
                        ].map((s, i) => (
                            <div key={i} className="rounded-xl p-4" style={{ background: '#111', border: '1px solid #1A1A1A' }}>
                                <div className="flex items-center gap-2 mb-2">
                                    <Icon name={s.icon} size={14} color="#555" />
                                    <span className="text-[10px] text-gray-500">{s.label}</span>
                                </div>
                                <div className="text-lg font-bold">{s.value}</div>
                            </div>
                        ))}
                    </div>

                    <button onClick={shareResults}
                        className="w-full flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-sm font-medium text-white transition-colors"
                        style={{ background: shared ? '#22C55E' : '#2563EB' }}>
                        <Icon name={shared ? 'Check' : 'Share2'} size={16} />
                        {shared ? 'Link Copied!' : 'Share My Results'}
                    </button>
                </div>
            </div>
        </div>
    );
}

// ── API Integration Section ──────────────────────────────────────────────────
function ApiIntegrationSection({ user }) {
    const [showKey, setShowKey] = useState(false);
    const [copied, setCopied]   = useState('');

    const clientId = user?.id || 'your-client-uuid';
    const apiKey   = 'bp_live_' + (user?.id ? user.id.replace(/-/g, '').slice(0, 24) : 'xxxxxxxxxxxxxxxxxxxxxxxx');
    const baseUrl  = SUPABASE_URL + '/functions/v1';

    const endpoints = [
        {
            label: 'Receive New Lead',
            url: `${baseUrl}/api-leads`,
            method: 'POST',
            body: `{
  "client_id": "${clientId}",
  "name": "John Doe",
  "company": "Acme Corp",
  "email": "john@acme.com",
  "phone": "(555) 123-4567",
  "specialty": "Commercial",
  "score": 8,
  "status": "New"
}`,
        },
        {
            label: 'Update Lead Status',
            url: `${baseUrl}/api-leads-update`,
            method: 'POST',
            body: `{
  "lead_id": "lead-uuid-here",
  "status": "Contacted"
}`,
        },
        {
            label: 'Receive Booked Appointment',
            url: `${baseUrl}/api-appointments`,
            method: 'POST',
            body: `{
  "client_id": "${clientId}",
  "prospect_name": "Jane Smith",
  "prospect_email": "jane@company.com",
  "meeting_datetime": "2026-05-15T14:00:00Z",
  "specialty": "Commercial",
  "notes": "Interested in GL coverage"
}`,
        },
        {
            label: 'Receive Weekly Report',
            url: `${baseUrl}/api-reports`,
            method: 'POST',
            body: `{
  "client_id": "${clientId}",
  "week": "May 5 – May 11",
  "leads_added": 25,
  "emails_sent": 192,
  "replies": 31,
  "appointments": 7
}`,
        },
    ];

    const maskedKey = apiKey.slice(0, 10) + '••••••••••••••' + apiKey.slice(-4);

    const copyToClipboard = (text, id) => {
        navigator.clipboard.writeText(text);
        setCopied(id);
        setTimeout(() => setCopied(''), 1500);
    };

    return (
        <div className="rounded-xl p-6 space-y-5" style={{ background: '#111', border: '1px solid #1A1A1A' }}>
            <div>
                <h2 className="text-sm font-medium text-gray-300 flex items-center gap-2">
                    <Icon name="Webhook" size={16} color="#2563EB" />
                    API Integration
                </h2>
                <p className="text-xs text-gray-500 mt-1">
                    Share these URLs with your Make.com scenario to connect your pipeline automatically.
                </p>
            </div>

            {/* API Key */}
            <div>
                <label className="block text-xs text-gray-500 mb-1.5">Your API Key</label>
                <div className="flex items-center gap-2">
                    <div
                        className="flex-1 rounded-lg px-4 py-2.5 text-sm font-mono"
                        style={{ background: '#0A0A0A', border: '1px solid #1A1A1A', color: '#9CA3AF' }}
                    >
                        {showKey ? apiKey : maskedKey}
                    </div>
                    <button
                        onClick={() => setShowKey(v => !v)}
                        className="px-3 py-2.5 rounded-lg text-xs text-gray-400 hover:text-white transition-colors"
                        style={{ border: '1px solid #1A1A1A' }}
                    >
                        <Icon name={showKey ? 'EyeOff' : 'Eye'} size={14} />
                    </button>
                    <button
                        onClick={() => copyToClipboard(apiKey, 'key')}
                        className="px-3 py-2.5 rounded-lg text-xs transition-colors"
                        style={{
                            border: `1px solid ${copied === 'key' ? 'rgba(34,197,94,0.3)' : '#1A1A1A'}`,
                            color: copied === 'key' ? '#22C55E' : '#9CA3AF',
                        }}
                    >
                        {copied === 'key' ? '✓' : <Icon name="Copy" size={14} />}
                    </button>
                </div>
                <p className="text-xs text-gray-600 mt-1.5">
                    Include as header: <code className="text-gray-500">x-api-key: your-key</code>
                </p>
            </div>

            {/* Client ID */}
            <div>
                <label className="block text-xs text-gray-500 mb-1.5">Your Client ID</label>
                <div className="flex items-center gap-2">
                    <div
                        className="flex-1 rounded-lg px-4 py-2.5 text-sm font-mono truncate"
                        style={{ background: '#0A0A0A', border: '1px solid #1A1A1A', color: '#9CA3AF' }}
                    >
                        {clientId}
                    </div>
                    <button
                        onClick={() => copyToClipboard(clientId, 'cid')}
                        className="px-3 py-2.5 rounded-lg text-xs transition-colors"
                        style={{
                            border: `1px solid ${copied === 'cid' ? 'rgba(34,197,94,0.3)' : '#1A1A1A'}`,
                            color: copied === 'cid' ? '#22C55E' : '#9CA3AF',
                        }}
                    >
                        {copied === 'cid' ? '✓' : <Icon name="Copy" size={14} />}
                    </button>
                </div>
            </div>

            {/* Endpoints */}
            <div>
                <label className="block text-xs text-gray-500 mb-2">Webhook Endpoints</label>
                <div className="space-y-3">
                    {endpoints.map((ep, i) => (
                        <div key={i} className="rounded-lg p-4 space-y-2" style={{ background: '#0A0A0A', border: '1px solid #1A1A1A' }}>
                            <div className="flex items-center justify-between">
                                <span className="text-xs font-medium text-gray-300">{ep.label}</span>
                                <span className="text-[10px] font-mono px-2 py-0.5 rounded"
                                    style={{ background: 'rgba(37,99,235,0.1)', color: '#60A5FA', border: '1px solid rgba(37,99,235,0.2)' }}>
                                    {ep.method}
                                </span>
                            </div>
                            <div className="flex items-center gap-2">
                                <code className="flex-1 text-xs text-gray-500 font-mono truncate">{ep.url}</code>
                                <button
                                    onClick={() => copyToClipboard(ep.url, `url-${i}`)}
                                    className="px-2 py-1 rounded text-xs transition-colors shrink-0"
                                    style={{
                                        border: `1px solid ${copied === `url-${i}` ? 'rgba(34,197,94,0.3)' : '#1A1A1A'}`,
                                        color: copied === `url-${i}` ? '#22C55E' : '#9CA3AF',
                                    }}
                                >
                                    {copied === `url-${i}` ? '✓ Copied' : 'Copy URL'}
                                </button>
                            </div>

                            {/* Expandable example body */}
                            <details className="group">
                                <summary className="text-xs text-gray-600 cursor-pointer hover:text-gray-400 transition-colors select-none">
                                    Example request body
                                </summary>
                                <pre
                                    className="mt-2 text-xs font-mono rounded-lg p-3 overflow-x-auto"
                                    style={{ background: '#060606', color: '#6B7280', border: '1px solid #141414' }}
                                >{ep.body}</pre>
                            </details>
                        </div>
                    ))}
                </div>
            </div>

            {/* Instructions */}
            <div className="rounded-lg px-4 py-3" style={{ background: 'rgba(37,99,235,0.05)', border: '1px solid rgba(37,99,235,0.15)' }}>
                <p className="text-xs text-blue-400 leading-relaxed">
                    <strong>How to connect:</strong> Copy your API key and the endpoint URLs above into your Make.com HTTP module.
                    Set the method to POST, add the <code className="font-mono">x-api-key</code> header, and send the JSON body matching the example format.
                    Leads, appointments, and reports will appear in your dashboard automatically.
                </p>
            </div>
        </div>
    );
}

// ── Settings page ─────────────────────────────────────────────────────────────
function SettingsPage({ user }) {
    const [saved, setSaved]     = useState(false);
    const [notifs, setNotifs]   = useState({ weekly: true, booked: true, replied: false });

    const save = () => {
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
    };

    const signOut = async () => {
        if (sb) await sb.auth.signOut();
        window.location.href = 'login.html';
    };

    return (
        <div className="space-y-6 max-w-xl">
            <div>
                <h1 className="text-lg font-semibold">Settings</h1>
                <p className="text-sm text-gray-500 mt-0.5">Manage your account</p>
            </div>

            {/* Account */}
            <div className="rounded-xl p-6 space-y-4" style={{ background: '#111', border: '1px solid #1A1A1A' }}>
                <h2 className="text-sm font-medium text-gray-300">Account Information</h2>
                {[
                    { label: 'Full Name',   placeholder: 'John Smith',           type: 'text' },
                    { label: 'Email',       placeholder: user?.email ?? 'you@example.com', type: 'email' },
                    { label: 'Brokerage',   placeholder: 'Smith Insurance Group', type: 'text' },
                    { label: 'Phone',       placeholder: '(555) 000-0000',        type: 'tel' },
                ].map(f => (
                    <div key={f.label}>
                        <label className="block text-xs text-gray-500 mb-1.5">{f.label}</label>
                        <input
                            type={f.type}
                            placeholder={f.placeholder}
                            className="w-full rounded-lg px-4 py-2.5 text-sm placeholder-gray-700 transition-colors"
                            style={{ background: '#0A0A0A', border: '1px solid #1A1A1A', color: '#e5e7eb' }}
                            onFocus={e => e.target.style.borderColor = '#2563EB'}
                            onBlur={e => e.target.style.borderColor = '#1A1A1A'}
                        />
                    </div>
                ))}
                <button
                    onClick={save}
                    className="px-5 py-2.5 rounded-lg text-sm font-medium transition-colors"
                    style={{
                        background: saved ? 'rgba(34,197,94,0.15)' : '#2563EB',
                        color: saved ? '#22C55E' : '#fff',
                        border: saved ? '1px solid rgba(34,197,94,0.3)' : '1px solid transparent',
                    }}
                    onMouseEnter={e => { if (!saved) e.currentTarget.style.background = '#1D4ED8'; }}
                    onMouseLeave={e => { if (!saved) e.currentTarget.style.background = '#2563EB'; }}
                >
                    {saved ? '✓ Saved' : 'Save Changes'}
                </button>
            </div>

            {/* Notifications */}
            <div className="rounded-xl p-6 space-y-4" style={{ background: '#111', border: '1px solid #1A1A1A' }}>
                <h2 className="text-sm font-medium text-gray-300">Notifications</h2>
                {[
                    { key: 'weekly', label: 'Weekly performance report' },
                    { key: 'booked', label: 'New appointment booked'    },
                    { key: 'replied',label: 'Lead replied to outreach'  },
                ].map(({ key, label }) => (
                    <label key={key} className="flex items-center justify-between cursor-pointer">
                        <span className="text-sm text-gray-400">{label}</span>
                        <div
                            onClick={() => setNotifs(prev => ({ ...prev, [key]: !prev[key] }))}
                            className="w-10 h-5 rounded-full relative transition-colors cursor-pointer"
                            style={{ background: notifs[key] ? '#2563EB' : '#1A1A1A' }}
                        >
                            <div
                                className="absolute top-0.5 w-4 h-4 bg-white rounded-full transition-transform"
                                style={{ transform: notifs[key] ? 'translateX(22px)' : 'translateX(2px)' }}
                            />
                        </div>
                    </label>
                ))}
            </div>

            {/* API Integration */}
            <ApiIntegrationSection user={user} />

            {/* Danger zone */}
            <div className="rounded-xl p-6" style={{ background: '#111', border: '1px solid rgba(239,68,68,0.2)' }}>
                <h2 className="text-sm font-medium mb-2" style={{ color: '#EF4444' }}>Danger Zone</h2>
                <p className="text-sm text-gray-500 mb-4">You will be signed out of your account.</p>
                <button
                    onClick={signOut}
                    className="px-5 py-2.5 rounded-lg text-sm font-medium transition-colors"
                    style={{ border: '1px solid rgba(239,68,68,0.3)', color: '#EF4444' }}
                    onMouseEnter={e => e.currentTarget.style.background = 'rgba(239,68,68,0.08)'}
                    onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                >
                    Sign Out
                </button>
            </div>
        </div>
    );
}

// ── Root App ──────────────────────────────────────────────────────────────────
function App() {
    const [page,    setPage]    = useState('overview');
    const [sbOpen,  setSbOpen]  = useState(false);
    const [loading, setLoading] = useState(true);
    const [user,    setUser]    = useState(null);
    const [leads,   setLeads]   = useState([]);
    const [appts,   setAppts]   = useState([]);
    const [reports, setReports] = useState([]);
    const [daily,   setDaily]   = useState([]);

    useEffect(() => {
        (async () => {
            try {
                if (sb) {
                    const { data: { session }, error } = await sb.auth.getSession();
                    if (error || !session) { window.location.href = 'login.html'; return; }
                    setUser(session.user);

                    const [lr, ar, rr, dr] = await Promise.all([
                        sb.from('leads').select('*').order('date_added', { ascending: false }),
                        sb.from('appointments').select('*').order('meeting_datetime'),
                        sb.from('reports').select('*').order('id', { ascending: false }),
                        sb.from('daily_leads').select('*').order('date'),
                    ]);

                    setLeads(lr.data?.length   ? lr.data : MOCK_LEADS);
                    setAppts(ar.data?.length   ? ar.data : MOCK_APPOINTMENTS);
                    setReports(rr.data?.length ? rr.data : MOCK_REPORTS);
                    setDaily(dr.data?.length
                        ? dr.data.map(d => ({ date: d.date.slice(5), leads: d.count }))
                        : MOCK_DAILY);
                } else {
                    // Demo mode (Supabase unavailable)
                    setUser({ email: 'demo@brokerpipeline.ai' });
                    setLeads(MOCK_LEADS);
                    setAppts(MOCK_APPOINTMENTS);
                    setReports(MOCK_REPORTS);
                    setDaily(MOCK_DAILY);
                }
            } catch (err) {
                console.warn('Init failed, using demo data:', err);
                setUser({ email: 'demo@brokerpipeline.ai' });
                setLeads(MOCK_LEADS);
                setAppts(MOCK_APPOINTMENTS);
                setReports(MOCK_REPORTS);
                setDaily(MOCK_DAILY);
            }
            setLoading(false);
        })();
    }, []);

    if (loading) {
        return (
            <div className="h-screen flex items-center justify-center" style={{ background: '#0A0A0A' }}>
                <div className="flex items-center gap-3 text-gray-400 text-sm">
                    <div
                        className="w-4 h-4 rounded-full border-2 border-t-transparent animate-spin"
                        style={{ borderColor: '#2563EB', borderTopColor: 'transparent' }}
                    />
                    Loading…
                </div>
            </div>
        );
    }

    const PAGES = {
        overview:     <OverviewPage     leads={leads}  reports={reports} daily={daily} />,
        leads:        <LeadsPage        leads={leads} setLeads={setLeads} user={user} />,
        appointments: <AppointmentsPage appointments={appts} />,
        reports:      <ReportsPage      reports={reports} appointments={appts} />,
        roi:          <ROIPage          appointments={appts} />,
        settings:     <SettingsPage     user={user} />,
    };

    return (
        <div className="h-screen flex overflow-hidden" style={{ background: '#0A0A0A' }}>
            <Sidebar page={page} setPage={setPage} open={sbOpen} setOpen={setSbOpen} />

            <div className="flex-1 flex flex-col md:ml-60 overflow-hidden">
                <TopBar user={user} open={sbOpen} setOpen={setSbOpen} />
                <main className="flex-1 overflow-y-auto p-5 md:p-6">
                    {PAGES[page]}
                </main>
            </div>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
