const _R = (typeof Recharts !== 'undefined') ? Recharts : {};
const {
    LineChart = () => null, Line = () => null,
    BarChart = () => null, Bar = () => null,
    XAxis = () => null, YAxis = () => null,
    CartesianGrid = () => null, Tooltip = () => null,
    PieChart = () => null, Pie = () => null, Cell = () => null,
    Legend = () => null,
} = _R;

function useContainerSize() {
    const ref = useRef(null);
    const [size, setSize] = useState({ width: 0, height: 0 });
    useEffect(() => {
        if (!ref.current) return;
        const update = () => {
            const { width, height } = ref.current.getBoundingClientRect();
            setSize({ width: Math.round(width), height: Math.round(height) });
        };
        update();
        const ro = new ResizeObserver(update);
        ro.observe(ref.current);
        return () => ro.disconnect();
    }, []);
    return [ref, size];
}

// ── Icon ─────────────────────────────────────────────────────────────────────
function Icon({ name, size = 18, color = 'currentColor', className = '' }) {
    const ref = useRef(null);
    useEffect(() => {
        if (!ref.current || !lucide?.icons?.[name]) return;
        ref.current.innerHTML = '';
        const svg = lucide.createElement(lucide.icons[name]);
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        svg.setAttribute('stroke', color);
        svg.style.display = 'block';
        svg.style.flexShrink = '0';
        ref.current.appendChild(svg);
    }, [name, size, color]);
    return <span ref={ref} className={`inline-flex items-center ${className}`} />;
}

    { name: 'Lisa Chen', plan: 'Growth', status: 'Paused', leads: 0, appts: 0, calls: 0, replyRate: 0, conversion: 0 },
    { name: 'Robert Williams', plan: 'Growth', status: 'Active', leads: 45, appts: 5, calls: 31, replyRate: 11.4, conversion: 11.1 },
    { name: 'Emma Taylor', plan: 'Scale', status: 'Churned', leads: 0, appts: 0, calls: 0, replyRate: 0, conversion: 0 },
    { name: 'David Brown', plan: 'Starter', status: 'Active', leads: 12, appts: 1, calls: 8, replyRate: 15.2, conversion: 8.3 },
    { name: 'Jennifer Martinez', plan: 'Growth', status: 'Active', leads: 61, appts: 8, calls: 47, replyRate: 13.5, conversion: 13.1 },

function genMRRData() {
    const months = ['Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb','Mar','Apr','May'];
    const base = 8000;
    return months.map((m, i) => ({
        month: m,
        mrr: Math.round(base + (i * 1600) + (Math.random() * 2000 - 500)),
    }));
}

function genWeeklyData() {
    const weeks = [];
    for (let i = 7; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i * 7);
        const label = `W${d.getMonth()*4 + Math.ceil(d.getDate()/7)}`;
        const leads = Math.floor(40 + Math.random() * 60);
        const appts = Math.floor(leads * (0.08 + Math.random() * 0.1));
        weeks.push({ week: label, leads, appointments: appts, conversion: parseFloat(((appts/leads)*100).toFixed(1)) });
    }
    return weeks;
}

function genActivityFeed() {
    const templates = [
        { tpl: 'New lead added for {{client}}', icon: 'UserPlus', color: '#2563EB' },
        { tpl: 'Voice agent booked meeting with {{lead}}', icon: 'PhoneCall', color: '#22C55E' },
        { tpl: 'Email opened by {{lead}}', icon: 'MailOpen', color: '#EAB308' },
        { tpl: 'New client onboarded: {{client}}', icon: 'UserCheck', color: '#8B5CF6' },
        { tpl: 'Email replied by {{lead}}', icon: 'MessageSquare', color: '#06B6D4' },
        { tpl: 'Call completed — {{lead}} not interested', icon: 'PhoneOff', color: '#EF4444' },
        { tpl: 'Appointment confirmed: {{lead}} with {{client}}', icon: 'CalendarCheck', color: '#22C55E' },
        { tpl: 'Lead score updated for {{lead}} → 9/10', icon: 'TrendingUp', color: '#F97316' },
        { tpl: 'Voicemail left for {{lead}}', icon: 'Voicemail', color: '#3B82F6' },
        { tpl: 'CSV imported: 25 leads for {{client}}', icon: 'Upload', color: '#2563EB' },
    ];
    const clients = ['John Smith','Sarah Johnson','Mike Davis','Robert Williams','David Brown','Jennifer Martinez'];
    const leads = ['James Carter','Lisa Monroe','David Park','Emma Chen','Ryan Torres','Olivia Grant','Noah Kim','Sophia Reyes','Ethan Brooks','Mia Patel'];
    const events = [];
    for (let i = 0; i < 50; i++) {
        const t = templates[Math.floor(Math.random() * templates.length)];
        const mins = Math.floor(Math.random() * 1440 * 3);
        let text = t.tpl.replace('{{client}}', clients[Math.floor(Math.random()*clients.length)])
                        .replace('{{lead}}', leads[Math.floor(Math.random()*leads.length)]);
        events.push({ id: i, text, icon: t.icon, color: t.color, minutesAgo: mins });
    }
    return events.sort((a,b) => a.minutesAgo - b.minutesAgo);
}

const MRR_DATA = genMRRData();

function fmtTime(mins) {
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    if (mins < 1440) return `${Math.floor(mins/60)}h ago`;
    return `${Math.floor(mins/1440)}d ago`;
}

    const [ref, { width }] = useContainerSize();

                <span className={`text-xs px-2 py-0.5 rounded-full ${parseFloat(growth) >= 0 ? 'bg-green-500/15 text-green-400' : 'bg-red-500/15 text-red-400'}`}>
                    {parseFloat(growth) >= 0 ? '+' : ''}{growth}% MoM

    return (

                <h3 className="text-sm font-semibold">Channel Breakdown</h3>
            </div>
            <div ref={ref} style={{ height: 220 }} className="flex items-center justify-center">
                {width > 0 && (
                    <PieChart width={Math.min(width, 400)} height={220}>
                        <Pie data={CHANNEL_DATA} cx="50%" cy="50%" innerRadius={55} outerRadius={85}
                            dataKey="value" isAnimationActive={false} stroke="none">
                            {CHANNEL_DATA.map((d, i) => <Cell key={i} fill={d.color} />)}
                        </Pie>
                        <Tooltip contentStyle={{ background: '#111', border: '1px solid #1F1F1F', borderRadius: 10, color: '#fff', fontSize: 12 }}
                            formatter={(v, n) => [`${v} (${((v/total)*100).toFixed(1)}%)`, n]} />

                )}
            </div>
            <div className="flex justify-center gap-6 mt-2">
                {CHANNEL_DATA.map(d => (
                    <div key={d.name} className="text-center">

            <div className="divide-y divide-[#1A1A1A] max-h-[400px] overflow-y-auto">
                {ACTIVITY_FEED.slice(0, limit).map(ev => (
                    <div key={ev.id} className="flex items-start gap-3 px-5 py-3 hover:bg-white/[0.02] transition-colors">

                            <Icon name={ev.icon} size={13} color={ev.color} />
                        </div>
                        <div className="flex-1 min-w-0">

                        <span className="text-[10px] text-gray-600 whitespace-nowrap flex-shrink-0">{fmtTime(ev.minutesAgo)}</span>

            </div>
            {limit < ACTIVITY_FEED.length && (
                <div className="px-5 py-3" style={{ borderTop: '1px solid #1F1F1F' }}>
                    <button onClick={() => setLimit(l => Math.min(l + 15, 50))}
                        className="text-xs text-blue-400 hover:text-blue-300">Show more</button>

            )}

}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
    const [sbOpen, setSbOpen] = useState(false);
    const [loading, setLoading] = useState(true);
    const [demoMode, setDemoMode] = useState(false);

    useEffect(() => {
        (async () => {
            if (!sb) { setDemoMode(true); setLoading(false); return; }
            try {
                const { data: { session }, error } = await sb.auth.getSession();
                if (error || !session || session.user.email !== ADMIN_EMAIL) setDemoMode(true);
            } catch(e) { setDemoMode(true); }
            setLoading(false);
        })();
    }, []);

    if (loading) return (
        <div className="h-full flex items-center justify-center">
            <div className="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin" />
        </div>
    );

    const activeClients = MOCK_CLIENTS.filter(c => c.status === 'Active');
    const totalMRR = activeClients.reduce((s, c) => s + (PLANS[c.plan] || 0), 0);
    const totalLeads = activeClients.reduce((s, c) => s + c.leads, 0);
    const totalAppts = activeClients.reduce((s, c) => s + c.appts, 0);
    const totalCalls = activeClients.reduce((s, c) => s + c.calls, 0);
    const avgROI = activeClients.length > 0
        ? ((activeClients.reduce((s, c) => s + (c.appts * 8000 * 0.25), 0) / activeClients.reduce((s, c) => s + (PLANS[c.plan] || 0), 0)) * 100).toFixed(0)
        : 0;

    return (
        <div className="h-full flex">
            <Sidebar open={sbOpen} setOpen={setSbOpen} />
            <main className="flex-1 md:ml-60 min-h-full">
                <header className="h-14 flex items-center justify-between px-5 sticky top-0 z-10"
                    style={{ background: '#0A0A0A', borderBottom: '1px solid #1A1A1A' }}>
                    <div className="flex items-center gap-3">
                        <button className="md:hidden text-gray-400" onClick={() => setSbOpen(true)}>
                            <Icon name="Menu" size={20} />
                        </button>
                        <span className="text-sm text-gray-500">Admin Analytics</span>
                    </div>
                    <div className="flex items-center gap-2">
                        {demoMode && (
                            <span className="text-[10px] px-2 py-0.5 rounded-full bg-yellow-500/10 text-yellow-400 border border-yellow-500/20">Demo Mode</span>
                        )}
                        <div className="w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold"
                            style={{ background: 'rgba(34,197,94,0.15)', color: '#22C55E', border: '1px solid rgba(34,197,94,0.25)' }}>A</div>
                    </div>
                </header>

                <div className="p-6 max-w-7xl space-y-6">
                    {/* Top row stat cards */}
                    <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4">
                        <StatCard label="Total MRR" value={`$${totalMRR.toLocaleString()}`} icon="DollarSign" trend="+12.4% MoM" trendUp />
                        <StatCard label="Active Clients" value={activeClients.length} icon="Users" trend="+2 this month" trendUp />
                        <StatCard label="Leads This Month" value={totalLeads} icon="UserPlus" trend="+18% vs last" trendUp />
                        <StatCard label="Appointments" value={totalAppts} icon="CalendarCheck" trend="+23% vs last" trendUp />
                        <StatCard label="Calls Made" value={totalCalls} icon="Phone" trend="232 total" />
                        <StatCard label="Avg Client ROI" value={`${avgROI}%`} icon="TrendingUp" trend="Healthy" trendUp />
                    </div>

                    {/* Charts row 1 */}
                    <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                        <MRRChart />
                        <LeadsVsApptsChart />
                    </div>

                    {/* Charts row 2 */}
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div className="lg:col-span-2">
                            <ClientPerformanceTable />
                        </div>
                        <ChannelDonut />
                    </div>

                    {/* Activity Feed */}
                    <ActivityFeed />
                </div>
            </main>
        </div>
    );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
